name: Bug report
description: Something is not working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible — it dramatically speeds up diagnosis.

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: "e.g. v20.11.0"
    validations:
      required: true

  - type: input
    id: synapse-version
    attributes:
      label: synapse-code-mcp version
      description: Output of `npx synapse-code-mcp --version` or the version in your package.json
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      description: OS name and version
      placeholder: "e.g. macOS 14.4, Ubuntu 22.04, Windows 11"
    validations:
      required: true

  - type: input
    id: repo-language
    attributes:
      label: Repository / language where the bug occurred
      description: The type of project you were serving when the issue appeared (optional but helpful)
      placeholder: "e.g. TypeScript monorepo, Python Django app, Go service"
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect Synapse to do?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reliably trigger the bug
      placeholder: |
        1. Run `npx synapse-code-mcp --root /path/to/project`
        2. Call tool `get_semantic_context` with file_path `src/foo.ts`
        3. ...
    validations:
      required: true

  - type: textarea
    id: debug-output
    attributes:
      label: Debug output
      description: |
        Run Synapse with `--log-level debug` and paste the relevant output here.
        ```
        npx synapse-code-mcp --root /path/to/project --log-level debug
        ```
      render: text
    validations:
      required: false
